apiVersion: 1

datasources:
  - name: 'Prometheus'
    type: 'prometheus'
    org_id: 1
    url: 'http://prometheus:9090'
    is_default: true
    version: 1
    editable: true
  - name: 'Jaeger'
    type: 'jaeger'
    access: proxy
    url: 'http://jaeger-all-in-one:16686'
    editable: true
  - name: 'Loki'
    type: loki
    access: proxy
    url: 'http://loki:3100'
    jsonData:
      maxLines: 1000
